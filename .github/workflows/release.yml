name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump type"
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
        required: true

permissions:
  contents: write
  id-token: write  # required for NuGet OIDC login

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version in .csproj
        id: version
        uses: vers-one/dotnet-project-version-updater@v1.6
        with:
          file: src/SecretsExpirationMonitor.Cli.csproj
          version: ${{ inputs.version_bump == 'major' && 'bump-major' || inputs.version_bump == 'minor' && 'bump-minor' || 'bump-patch' }}

      - name: Build
        run: dotnet build src/ --configuration Release --no-incremental

      - name: Test
        run: dotnet test tests/ --configuration Release --no-build --logger "console;verbosity=normal"

      - name: Pack
        run: dotnet pack src/ --configuration Release --no-build --output nupkg

      - name: Commit version bump
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Bump version to v${{ steps.version.outputs.newVersion }}"
          file_pattern: src/SecretsExpirationMonitor.Cli.csproj

      - name: Create tag and GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.newVersion }}"
          generate_release_notes: true
          make_latest: true
          files: nupkg/*.nupkg

      - name: NuGet login (OIDC)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: basmulder03

      - name: Publish to NuGet
        run: |
          dotnet nuget push nupkg/*.nupkg \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
